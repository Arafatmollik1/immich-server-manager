<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Immich Server Manager</title>
    <style>
      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        text-align: center;
        padding: 50px;
        background-color: #1e1e2e; /* Dark theme */
        color: #cdd6f4;
      }
      h1 {
        margin-bottom: 5px;
      }
      p {
        color: #a6adc8;
        margin-bottom: 30px;
      }
      button {
        padding: 12px 24px;
        font-size: 16px;
        cursor: pointer;
        background-color: #89b4fa;
        border: none;
        border-radius: 8px;
        color: #11111b;
        font-weight: bold;
        transition: 0.2s;
      }
      button:hover {
        background-color: #b4befe;
      }
      button:active {
        transform: scale(0.95);
      }
      #status {
        margin-top: 30px;
        font-size: 16px;
        font-weight: 500;
        max-width: 400px;
        margin-left: auto;
        margin-right: auto;
      }

      /* Status Colors */
      .error {
        color: #f38ba8;
      }
      .success {
        color: #a6e3a1;
      }
      .loading {
        color: #f9e2af;
      }
    </style>
  </head>
  <body>
    <h1>Immich Server Manager</h1>
    <p>Your self-hosted photo vault.</p>

    <button id="check-btn">1. Run Pre-Flight Check</button>
    <button id="setup-btn" style="margin-top: 10px; background-color: #a6e3a1">
      2. Download Server Files
    </button>
    <button id="folder-btn" style="margin-top: 10px; background-color: #f9e2af">
      3. Choose Photo Folder
    </button>

    <hr style="margin: 30px 0; border-color: #45475a" />

    <button
      id="live-btn"
      style="background-color: #a6e3a1; font-size: 20px; padding: 15px 30px"
    >
      GO LIVE 🚀
    </button>
    <button
      id="dead-btn"
      style="
        background-color: #f38ba8;
        font-size: 20px;
        padding: 15px 30px;
        margin-left: 10px;
      "
    >
      GO DEAD 🛑
    </button>

    <div id="status"></div>
    <div id="link-container" style="margin-top: 15px; font-size: 18px"></div>

    <div id="status"></div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
